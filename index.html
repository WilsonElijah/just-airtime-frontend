<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Airtime - Vertical Jump Program</title>
    <meta name="description"
        content="Elevate your game with the Just Airtime vertical jump training program. Track your progress and achieve new heights.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">Just Airtime</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#program">The Program</a></li>
            <li><a href="tracker.html">Progress Tracker</a></li>
        </ul>
    </nav>
    <!-- Form Overlay -->
    <div class="form-overlay">
        <form class="workout-form">
            <h2>Log Workout</h2>

            <div class="form-group">
                <label for="vertical">Vertical Height (inches)</label>
                <input type="number" id="vertical" name="vertical" placeholder="e.g. 32" required>
            </div>

            <div class="form-group">
                <label for="dunk-type">Dunk Type</label>
                <select id="dunk-type" name="dunk-type">
                    <option value="standard">Standard</option>
                    <option value="windmill">Windmill</option>
                    <option value="eastbay">Eastbay</option>
                    <option value="360">360</option>
                    <option value="free-throw">Free-throw line</option>
                </select>
            </div>

            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="3" placeholder="How did it feel?"></textarea>
            </div>

            <p id="success-message" class="success-message" style="display: none;">Session Saved!</p>

            <button type="submit" class="submit-btn">SAVE SESSION</button>
        </form>
    </div>

    <!-- Three.js Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Import Map for Three.js ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- Main Application Logic -->
    <script type="module" src="main.js"></script>
</body>

</html>
